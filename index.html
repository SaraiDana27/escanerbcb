<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Escáner BCB</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@2/dist/tesseract.min.js"></script>
</head>
<body>

<h2>Escanear Número de Serie</h2>
<input type="file" id="imageInput" accept="image/*" capture="camera">
<p id="estado"></p>

<script>
document.getElementById('imageInput').addEventListener('change', function(e){

  const file = e.target.files[0];
  document.getElementById("estado").innerText = "Procesando imagen...";

  Tesseract.recognize(file, 'eng')
  .then(({ data: { text } }) => {

    // Extraer solo números
    let numero = text.replace(/\D/g, '');

    if(numero.length > 0){

      // Copiar al portapapeles
      navigator.clipboard.writeText(numero)
      .then(() => {

        alert("Número copiado: " + numero + 
              "\n\nSe abrirá el verificador.\nSolo presiona PEGAR en el campo Serie.");

        // Redireccionar
        window.location.href = 
        "https://www.bcb.gob.bo/?q=content/verificador-de-n%C3%BAmero-de-serie";

      });

    } else {
      alert("No se detectó un número válido.");
    }

  });

});
</script>

</body>
</html>
